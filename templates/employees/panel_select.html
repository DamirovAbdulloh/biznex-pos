<!DOCTYPE html>
{% load static %}
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panellar — Biznex</title>
<link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
<style>
body {
  min-height:100vh; margin:0;
  background:
    radial-gradient(circle at 15% 20%, rgba(34,197,94,0.18), transparent 45%),
    radial-gradient(circle at 85% 75%, rgba(59,130,246,0.16), transparent 50%),
    linear-gradient(135deg,#0d1117 0%,#161b22 60%,#0d1117 100%);
}
.top-bar { display:flex; align-items:center; justify-content:space-between; padding:22px 32px; }
.logo-text { font-weight:900; font-size:26px; color:#22c55e; letter-spacing:.5px; }
.icon-btn {
  width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.08); color:#e5e7eb;
  display:flex; align-items:center; justify-content:center; cursor:pointer; transition:.15s;
}
.icon-btn:hover { background:rgba(255,255,255,0.16); }
.panel-wrap { padding:20px 32px 48px; }
.panel-hint { color:#9ca3af; font-size:14px; margin-bottom:24px; }
.emp-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); gap:22px; }
.emp-card {
  position:relative; border-radius:20px; padding:22px;
  background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.09);
  backdrop-filter:blur(6px); text-decoration:none; display:block; transition:all .18s ease;
  min-height:150px;
}
.emp-card:hover { background:rgba(255,255,255,0.11); border-color:rgba(34,197,94,0.4); transform:translateY(-3px); }
.emp-icon {
  width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center;
  background:rgba(34,197,94,0.18); color:#4ade80; margin-bottom:26px;
}
.emp-name { color:#fff; font-weight:800; font-size:16px; margin-bottom:2px; }
.emp-role { color:#9ca3af; font-size:13px; margin-bottom:18px; }
.emp-login-link { color:#4ade80; font-size:13px; font-weight:700; display:flex; align-items:center; gap:5px; }
.empty-state { color:#6b7280; text-align:center; padding:80px 20px; }
</style>
</head>
<body>

<div class="top-bar">
  <span class="logo-text">Biznex</span>
  <div class="flex items-center gap-3">
    <div class="icon-btn" onclick="window.location.reload()" title="Yangilash">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4v6h6M20 20v-6h-6M5 15a7 7 0 0011.6 3.2M19 9a7 7 0 00-11.6-3.2"/></svg>
    </div>
    <div class="icon-btn" onclick="toggleFullscreen()" title="To'liq ekran">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
    </div>
  </div>
</div>

<div class="panel-wrap">
  <p class="panel-hint">Panelga kirish uchun xodimni tanlang</p>
  <div class="emp-grid">
    {% for emp in employees %}
    <a href="{% url 'employees:panel_pin_entry' emp.pk %}" class="emp-card">
      <div class="emp-icon">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
      </div>
      <div class="emp-name">{{ emp.name|upper }}</div>
      <div class="emp-role">{{ emp.role.name|default:"Xodim" }}</div>
      <div class="emp-login-link">Tizimga kirish →</div>
    </a>
    {% empty %}
    <div class="empty-state">
      <p>Hech qanday faol xodim topilmadi.</p>
      <p class="text-sm mt-1">Avval Hodimlar bo'limidan xodim qo'shing.</p>
    </div>
    {% endfor %}
  </div>
</div>

<script>
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(function(){});
  } else {
    document.exitFullscreen();
  }
}
</script>
</body>
</html>
